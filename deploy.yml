name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Recomendo a 20 para projetos Vite novos
          cache: 'npm'
          # Removi o cache-dependency-path que apontava para pasta errada

      - name: Install dependencies
        run: npm install # Executa na raiz agora

      - name: Build
        run: npm run build # Executa na raiz agora
        env:
          DEPLOY_ENV: gh-pages

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist